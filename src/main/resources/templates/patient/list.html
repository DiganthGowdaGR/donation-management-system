<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patients - DonationMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">🩸 DonationMS</a>
            <div class="navbar-nav flex-row gap-3">
                <a class="nav-link text-white" href="/donor/list">Donors</a>
                <a class="nav-link text-white" href="/patient/list">Patients</a>
                <a class="nav-link text-white" href="/inventory">Inventory</a>
                <a class="nav-link text-white" href="/request/list">Requests</a>
                <a class="nav-link text-white" href="/admin/dashboard">Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Patient List 
                <small class="text-muted fs-6">SRN 364: Nandani Sonale</small>
            </h4>
            <a href="/patient/register" class="btn btn-danger">+ Register Patient</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Blood Needed</th>
                    <th>Organ Needed</th>
                    <th>Urgency</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(patients)}">
                    <td colspan="8" class="text-center text-muted">
                        No patients registered yet.
                    </td>
                </tr>
                <tr th:each="patient : ${patients}">
                    <td th:text="${patient.id}"></td>
                    <td th:text="${patient.name}"></td>
                    <td th:text="${patient.email}"></td>
                    <td th:text="${patient.phone}"></td>
                    <td>
                        <span class="badge bg-danger" 
                              th:text="${patient.requiredBloodType}"></span>
                    </td>
                    <td th:text="${patient.requiredOrgan}"></td>
                    <td>
                        <span th:class="${patient.urgencyLevel == 'CRITICAL'} ? 'badge bg-danger' : (${patient.urgencyLevel == 'HIGH'} ? 'badge bg-warning text-dark' : 'badge bg-info text-dark')"
                              th:text="${patient.urgencyLevel}">
                        </span>
                    </td>
                    <td>
                        <form th:action="@{/patient/delete/{id}(id=${patient.id})}" 
                              method="post" style="display:inline">
                            <button type="submit" 
                                    class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Delete this patient?')">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
