<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Donation - DonationMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">🩸 DonationMS</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width:500px">
        <h4>Record New Donation
            <small class="text-muted fs-6">SRN 363: Nandan D</small>
        </h4>
        <hr>
        <form th:action="@{/donation/new}" method="post">
            <div class="mb-3">
                <label class="form-label">Donor ID</label>
                <input type="number" name="donorId" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Donation Type</label>
                <select name="donationType" class="form-select" required>
                    <option th:each="dt : ${donationTypes}"
                            th:value="${dt}" th:text="${dt}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Blood Type</label>
                <select name="bloodType" class="form-select">
                    <option value="">Select</option>
                    <option th:each="bt : ${bloodTypes}"
                            th:value="${bt}" th:text="${bt}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Organ Type</label>
                <select name="organType" class="form-select">
                    <option th:each="ot : ${organTypes}"
                            th:value="${ot}" th:text="${ot}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Quantity (units)</label>
                <input type="number" name="quantity" class="form-control" min="1" value="1">
            </div>
            <button type="submit" class="btn btn-danger w-100">
                Record Donation
            </button>
            <a href="/donation/list" class="btn btn-outline-secondary w-100 mt-2">
                Cancel
            </a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
