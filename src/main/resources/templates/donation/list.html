<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Donations - DonationMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">🩸 DonationMS</a>
            <div class="navbar-nav flex-row gap-3">
                <a class="nav-link text-white" href="/donor/list">Donors</a>
                <a class="nav-link text-white" href="/patient/list">Patients</a>
                <a class="nav-link text-white" href="/inventory">Inventory</a>
                <a class="nav-link text-white" href="/donation/list">Donations</a>
                <a class="nav-link text-white" href="/admin/dashboard">Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Donation Records
                <small class="text-muted fs-6">SRN 363: Nandan D</small>
            </h4>
            <a href="/donation/new" class="btn btn-danger">+ New Donation</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Donor ID</th>
                    <th>Type</th>
                    <th>Blood Type</th>
                    <th>Organ</th>
                    <th>Quantity</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(donations)}">
                    <td colspan="9" class="text-center text-muted">
                        No donations recorded yet.
                    </td>
                </tr>
                <tr th:each="d : ${donations}">
                    <td th:text="${d.donationId}"></td>
                    <td th:text="${d.donorId}"></td>
                    <td th:text="${d.donationType}"></td>
                    <td>
                        <span class="badge bg-danger" th:text="${d.bloodType}"></span>
                    </td>
                    <td th:text="${d.organType}"></td>
                    <td th:text="${d.quantity}"></td>
                    <td th:text="${d.date}"></td>
                    <td>
                        <span th:class="${d.status == 'APPROVED'} ? 'badge bg-success' : (${d.status == 'PENDING'} ? 'badge bg-warning text-dark' : 'badge bg-info text-dark')"
                              th:text="${d.status}">
                        </span>
                    </td>
                    <td>
                        <form th:action="@{/donation/status/{id}(id=${d.donationId})}"
                              method="post" style="display:inline">
                            <select name="status" class="form-select form-select-sm d-inline w-auto">
                                <option value="PENDING">PENDING</option>
                                <option value="APPROVED">APPROVED</option>
                                <option value="ALLOCATED">ALLOCATED</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary ms-1">
                                Update
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
