<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Request - DonationMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">DonationMS</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width:500px">
        <h4>New Blood / Organ Request
            <small class="text-muted fs-6">SRN 823: Sharath Gowda GR</small>
        </h4>
        <hr>
        <form th:action="@{/request/new}" method="post">
            <div class="mb-3">
                <label class="form-label">Patient ID</label>
                <input type="number" name="patientId"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Request Type</label>
                <select name="requestType" class="form-select" required>
                    <option th:each="rt : ${requestTypes}"
                            th:value="${rt}" th:text="${rt}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Blood Type Required</label>
                <select name="bloodType" class="form-select">
                    <option value="">Select</option>
                    <option th:each="bt : ${bloodTypes}"
                            th:value="${bt}" th:text="${bt}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Organ Required</label>
                <select name="organType" class="form-select">
                    <option th:each="ot : ${organTypes}"
                            th:value="${ot}" th:text="${ot}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Urgency Level</label>
                <select name="urgencyLevel" class="form-select" required>
                    <option th:each="ul : ${urgencyLevels}"
                            th:value="${ul}" th:text="${ul}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-danger w-100">
                Submit Request
            </button>
            <a href="/request/list"
               class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
