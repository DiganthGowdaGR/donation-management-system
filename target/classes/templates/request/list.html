<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Requests - DonationMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">DonationMS</a>
            <div class="navbar-nav flex-row gap-3">
                <a class="nav-link text-white" href="/donor/list">Donors</a>
                <a class="nav-link text-white" href="/patient/list">Patients</a>
                <a class="nav-link text-white" href="/inventory">Inventory</a>
                <a class="nav-link text-white" href="/donation/list">Donations</a>
                <a class="nav-link text-white" href="/request/list">Requests</a>
                <a class="nav-link text-white" href="/admin/dashboard">Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Blood and Organ Requests
                <small class="text-muted fs-6">SRN 823: Sharath Gowda GR</small>
            </h4>
            <div>
                <a href="/request/emergency" class="btn btn-outline-danger me-2">
                    Emergency Requests
                    <span class="badge bg-danger ms-1"
                          th:text="${emergencyCount}">0</span>
                </a>
                <a href="/request/new" class="btn btn-danger">New Request</a>
            </div>
        </div>

        <div th:if="${success}" 
             class="alert alert-success" th:text="${success}"></div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Patient ID</th>
                    <th>Type</th>
                    <th>Blood Type</th>
                    <th>Organ</th>
                    <th>Urgency</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(requests)}">
                    <td colspan="9" class="text-center text-muted">
                        No requests found.
                    </td>
                </tr>
                <tr th:each="r : ${requests}">
                    <td th:text="${r.requestId}"></td>
                    <td th:text="${r.patientId}"></td>
                    <td th:text="${r.requestType}"></td>
                    <td th:text="${r.bloodType}"></td>
                    <td th:text="${r.organType}"></td>
                    <td>
                        <span th:class="${r.urgencyLevel == 'CRITICAL'} ? 'badge bg-danger' : (${r.urgencyLevel == 'HIGH'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')"
                              th:text="${r.urgencyLevel}">
                        </span>
                    </td>
                    <td th:text="${r.requestDate}"></td>
                    <td>
                        <span th:class="${r.status == 'FULFILLED'} ? 'badge bg-success' : (${r.status == 'PENDING'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')"
                              th:text="${r.status}">
                        </span>
                    </td>
                    <td>
                        <form th:action="@{/request/status/{id}(id=${r.requestId})}"
                              method="post" style="display:inline">
                            <select name="status"
                                    class="form-select form-select-sm d-inline w-auto">
                                <option value="PENDING">PENDING</option>
                                <option value="MATCHED">MATCHED</option>
                                <option value="FULFILLED">FULFILLED</option>
                                <option value="CANCELLED">CANCELLED</option>
                            </select>
                            <button type="submit"
                                    class="btn btn-sm btn-outline-primary ms-1">
                                Update
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
