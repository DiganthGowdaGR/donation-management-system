<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Donor - DonationMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">🩸 DonationMS</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 500px">
        <h4>Register Donor 
            <small class="text-muted fs-6">SRN 364: Nandani Sonale</small>
        </h4>
        <hr>
        <form th:action="@{/donor/register}" method="post">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Blood Type</label>
                <select name="bloodType" class="form-select" required>
                    <option value="">Select</option>
                    <option th:each="bt : ${bloodTypes}" 
                            th:value="${bt}" th:text="${bt}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Organ Type</label>
                <select name="organType" class="form-select">
                    <option th:each="ot : ${organTypes}" 
                            th:value="${ot}" th:text="${ot}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-danger w-100">
                Register Donor
            </button>
            <a href="/donor/list" class="btn btn-outline-secondary w-100 mt-2">
                Cancel
            </a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
